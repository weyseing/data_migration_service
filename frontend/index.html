<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini IronBook — Data Migration Dashboard</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/@viz-js/viz@3.2.4/lib/viz-standalone.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #fff; color: #111; }

    /* Nav */
    .navbar { position: sticky; top: 0; z-index: 100; padding: 12px 24px; }
    .navbar-inner {
      max-width: 960px; margin: 0 auto;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
      transition: all 0.3s;
    }
    .navbar.on-dark .navbar-inner {
      background: rgba(15,23,42,0.75);
      border-color: rgba(255,255,255,0.1);
    }
    .logo { font-weight: 700; font-size: 15px; color: #111; transition: color 0.3s; }
    .logo span { color: #9ca3af; }
    .navbar.on-dark .logo { color: #fff; }
    .navbar.on-dark .logo span { color: rgba(255,255,255,0.4); }
    .nav-tag {
      font-size: 11px; font-weight: 500; color: #9ca3af;
      transition: color 0.3s;
    }
    .navbar.on-dark .nav-tag { color: rgba(255,255,255,0.4); }

    /* Hero */
    .hero {
      background: #0f172a; color: #fff;
      padding: 72px 24px 64px; text-align: center;
    }
    .hero h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    .hero p { color: rgba(255,255,255,0.5); font-size: 15px; margin-bottom: 28px; }

    /* Button */
    .btn {
      background: #fff; color: #0f172a; border: none;
      padding: 10px 24px; border-radius: 8px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { background: #f1f5f9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Stats */
    .stats-bar { background: #0f172a; padding: 0 24px 48px; }
    .stats-row {
      max-width: 960px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    }
    .stat {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 20px; text-align: center;
    }
    .stat-val { font-size: 28px; font-weight: 700; color: #fff; }
    .stat-lbl { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }

    /* Content */
    .content { max-width: 960px; margin: 0 auto; padding: 32px 24px 48px; }

    /* Section header */
    .sh { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    h2 { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 12px; }

    /* Card */
    .card {
      background: #fff; border: 1px solid #f0f0f0; border-radius: 12px;
      padding: 16px; margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #e0e0e0; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: #9ca3af; font-weight: 500; font-size: 11px; border-bottom: 1px solid #f0f0f0; }
    td { padding: 8px 12px; border-bottom: 1px solid #fafafa; color: #555; }
    tr:hover td { background: #fafbfc; }
    td strong { color: #111; font-weight: 600; }
    code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: #0369a1; background: #f0f9ff; padding: 1px 5px; border-radius: 4px; }

    /* Expandable */
    .exp { cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 2px 0; }
    .exp:hover { opacity: 0.7; }
    .arr { font-size: 10px; color: #ccc; transition: transform 0.2s; display: inline-block; }
    .arr.open { transform: rotate(90deg); }
    .exp-name { font-weight: 600; color: #111; }

    /* Badge */
    .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px; background: #f4f4f5; color: #71717a; }

    /* Code block */
    pre { background: #0f172a; color: #e2e8f0; padding: 16px; border-radius: 10px; overflow-x: auto; font-family: 'SF Mono', monospace; font-size: 12px; line-height: 1.6; }

    /* FK */
    .fk-list { list-style: none; padding: 0; margin-top: 10px; }
    .fk-list li { padding: 4px 0; color: #777; font-size: 13px; }

    /* Graph */
    .graph-box {
      background: #0f172a; border-radius: 12px;
      padding: 24px; text-align: center; margin-top: 4px;
    }
    .graph-box svg { max-width: 100%; height: auto; }
    .graph-box svg text { fill: #cbd5e1 !important; font-family: 'Inter', sans-serif !important; }
    .graph-box svg polygon { fill: none !important; stroke: none !important; }
    .graph-box svg path, .graph-box svg ellipse { stroke: rgba(255,255,255,0.25) !important; }
    .graph-box svg polygon[fill="black"] { fill: rgba(255,255,255,0.25) !important; stroke: rgba(255,255,255,0.25) !important; }
    .load-order { margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
    .load-order strong { font-size: 12px; color: rgba(255,255,255,0.35); font-weight: 500; }
    .lo-chip { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6); padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
    .lo-arrow { color: rgba(255,255,255,0.15); font-size: 12px; }

    /* Status */
    .status { padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; font-weight: 500; }
    .status.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .status.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }

    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .hero h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="navbar-inner">
      <div class="logo">IronBook <span>AI</span></div>
      <div class="nav-tag">Migration Dashboard</div>
    </div>
  </div>

  <div id="app">
    <div class="hero" data-dark>
      <h1>Schema Discovery</h1>
      <p>Scan your source database, map dependencies, and prepare for migration.</p>
      <button class="btn" @click="runDiscovery" :disabled="loading">
        <span v-if="loading" class="spinner"></span>
        {{ loading ? 'Scanning...' : 'Run Discovery' }}
      </button>
    </div>

    <div v-if="discovery" class="stats-bar" data-dark>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-val">{{ discovery.tables.length }}</div>
          <div class="stat-lbl">Tables</div>
        </div>
        <div class="stat">
          <div class="stat-val">{{ totalColumns }}</div>
          <div class="stat-lbl">Columns</div>
        </div>
        <div class="stat">
          <div class="stat-val">{{ discovery.stored_procedures.length }}</div>
          <div class="stat-lbl">Procedures</div>
        </div>
        <div class="stat">
          <div class="stat-val">{{ totalRows }}</div>
          <div class="stat-lbl">Rows</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div v-if="status" class="status" :class="status.type">{{ status.message }}</div>

      <template v-if="discovery">
        <div class="sh">Schema</div>
        <h2>Tables</h2>
        <div class="card">
          <table>
            <thead>
              <tr><th>Table</th><th>Columns</th><th>Primary Key</th><th>FKs</th><th>Indexes</th><th>Rows</th></tr>
            </thead>
            <tbody>
              <tr v-for="t in discovery.tables" :key="t.name">
                <td><strong>{{ t.name }}</strong></td>
                <td>{{ t.columns.length }}</td>
                <td><code>{{ t.primary_key.join(', ') }}</code></td>
                <td>{{ t.foreign_keys.length }}</td>
                <td>{{ t.indexes.length }}</td>
                <td>{{ t.row_count }}</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="sh" style="margin-top: 32px;">Inspection</div>
        <h2>Column Details</h2>
        <div v-for="t in discovery.tables" :key="t.name" class="card">
          <div class="exp" @click="toggle(t.name)">
            <span class="arr" :class="{ open: expanded[t.name] }">&#9654;</span>
            <span class="exp-name">{{ t.name }}</span>
            <span class="badge">{{ t.columns.length }} cols</span>
            <span class="badge">{{ t.row_count }} rows</span>
          </div>
          <div v-if="expanded[t.name]" style="margin-top: 12px;">
            <table>
              <thead><tr><th>Column</th><th>Type</th><th>Nullable</th><th>PK</th><th>Default</th></tr></thead>
              <tbody>
                <tr v-for="c in t.columns" :key="c.name">
                  <td><strong>{{ c.name }}</strong></td>
                  <td><code>{{ c.data_type }}</code></td>
                  <td>{{ c.nullable ? 'Yes' : 'No' }}</td>
                  <td>{{ c.is_primary_key ? 'Yes' : '' }}</td>
                  <td>{{ c.default || '' }}</td>
                </tr>
              </tbody>
            </table>
            <ul v-if="t.foreign_keys.length" class="fk-list">
              <li v-for="fk in t.foreign_keys" :key="fk.name">
                <code>{{ fk.constrained_columns.join(', ') }}</code>
                &rarr; <code>{{ fk.referred_table }}.{{ fk.referred_columns.join(', ') }}</code>
              </li>
            </ul>
          </div>
        </div>

        <template v-if="discovery.stored_procedures.length">
          <div class="sh" style="margin-top: 32px;">Logic</div>
          <h2>Stored Procedures</h2>
          <div v-for="proc in discovery.stored_procedures" :key="proc.name" class="card">
            <div class="exp" @click="toggle('proc_' + proc.name)">
              <span class="arr" :class="{ open: expanded['proc_' + proc.name] }">&#9654;</span>
              <span class="exp-name">{{ proc.name }}</span>
              <span class="badge">{{ proc.db }}</span>
            </div>
            <pre v-if="expanded['proc_' + proc.name]" style="margin-top: 12px;">{{ proc.body }}</pre>
          </div>
        </template>

        <!-- Step 2: Mapping -->
        <div style="margin-top: 48px; padding-top: 32px; border-top: 1px solid #f0f0f0;">
          <div class="sh">Step 2</div>
          <h2>Type Mapping</h2>
          <p style="color: #999; font-size: 13px; margin-bottom: 16px;">Map MySQL types to PostgreSQL using SQLGlot + Claude AI for stored procedures.</p>
          <button class="btn" style="background: #0f172a; color: #fff; margin-bottom: 20px;" @click="runMapping" :disabled="mappingLoading">
            <span v-if="mappingLoading" class="spinner"></span>
            {{ mappingLoading ? 'Mapping...' : 'Run Mapping' }}
          </button>
          <div v-if="mappingStatus" class="status" :class="mappingStatus.type">{{ mappingStatus.message }}</div>
        </div>

        <template v-if="mapping">
          <!-- Type Mappings -->
          <div v-for="tm in mapping.table_mappings" :key="tm.source_table" class="card">
            <div class="exp" @click="toggle('map_' + tm.source_table)">
              <span class="arr" :class="{ open: expanded['map_' + tm.source_table] }">&#9654;</span>
              <span class="exp-name">{{ tm.source_table }}</span>
              <span class="badge">{{ tm.column_mappings.length }} mappings</span>
            </div>
            <div v-if="expanded['map_' + tm.source_table]" style="margin-top: 12px;">
              <table>
                <thead><tr><th>Column</th><th>MySQL</th><th></th><th>PostgreSQL</th><th>Notes</th></tr></thead>
                <tbody>
                  <tr v-for="c in tm.column_mappings" :key="c.source_column">
                    <td><strong>{{ c.source_column }}</strong></td>
                    <td><code>{{ c.source_type }}</code></td>
                    <td style="color: #ccc;">&rarr;</td>
                    <td><code>{{ c.target_type }}</code></td>
                    <td style="color: #999; font-size: 12px;">{{ c.notes }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Procedure Mappings -->
          <template v-if="mapping.procedure_mappings.length">
            <div class="sh" style="margin-top: 32px;">AI Conversion</div>
            <h2>Procedure Mapping</h2>
            <div v-for="pm in mapping.procedure_mappings" :key="pm.source_name" class="card">
              <div class="exp" @click="toggle('pmap_' + pm.source_name)">
                <span class="arr" :class="{ open: expanded['pmap_' + pm.source_name] }">&#9654;</span>
                <span class="exp-name">{{ pm.source_name }}</span>
                <span class="badge">{{ pm.explanation }}</span>
              </div>
              <div v-if="expanded['pmap_' + pm.source_name]" style="margin-top: 12px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                  <div>
                    <div style="font-size: 11px; font-weight: 600; color: #999; margin-bottom: 6px;">MySQL (source)</div>
                    <pre>{{ pm.source_body }}</pre>
                  </div>
                  <div>
                    <div style="font-size: 11px; font-weight: 600; color: #999; margin-bottom: 6px;">PostgreSQL (target)</div>
                    <pre>{{ pm.target_sql }}</pre>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </template>

        <div class="sh" style="margin-top: 32px;">Dependencies</div>
        <h2>Migration Graph</h2>
        <div class="graph-box" data-dark>
          <div id="graph-output"></div>
          <div v-if="graphData" class="load-order">
            <strong>Load order:</strong>
            <template v-for="(table, i) in graphData.load_order" :key="table">
              <span class="lo-chip">{{ table }}</span>
              <span v-if="i < graphData.load_order.length - 1" class="lo-arrow">&rarr;</span>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive, computed, nextTick } = Vue
    createApp({
      setup() {
        const loading = ref(false)
        const status = ref(null)
        const discovery = ref(null)
        const graphData = ref(null)
        const expanded = reactive({})
        const mapping = ref(null)
        const mappingLoading = ref(false)
        const mappingStatus = ref(null)
        const totalColumns = computed(() => discovery.value ? discovery.value.tables.reduce((s, t) => s + t.columns.length, 0) : 0)
        const totalRows = computed(() => discovery.value ? discovery.value.tables.reduce((s, t) => s + (t.row_count || 0), 0) : 0)

        async function runDiscovery() {
          loading.value = true; status.value = null
          try {
            const resp = await fetch('/api/discovery/run', { method: 'POST' })
            if (!resp.ok) throw new Error(await resp.text())
            discovery.value = await resp.json()
            status.value = { type: 'success', message: `Discovery complete — ${discovery.value.tables.length} tables, ${discovery.value.stored_procedures.length} procedures found.` }
            const gr = await fetch('/api/discovery/graph')
            if (gr.ok) { graphData.value = await gr.json(); await nextTick(); renderGraph(graphData.value.dot) }
          } catch (e) { status.value = { type: 'error', message: 'Discovery failed: ' + e.message } }
          finally { loading.value = false }
        }

        async function renderGraph(dot) {
          try {
            const viz = await Viz.instance()
            const svg = viz.renderSVGElement(dot)
            const el = document.getElementById('graph-output')
            el.innerHTML = ''; el.appendChild(svg)
          } catch (e) { console.error('Graph render failed:', e) }
        }

        async function runMapping() {
          mappingLoading.value = true; mappingStatus.value = null
          try {
            const resp = await fetch('/api/mapping/run', { method: 'POST' })
            if (!resp.ok) throw new Error(await resp.text())
            mapping.value = await resp.json()
            mappingStatus.value = { type: 'success', message: `Mapping complete — ${mapping.value.table_mappings.length} tables, ${mapping.value.procedure_mappings.length} procedures mapped.` }
          } catch (e) { mappingStatus.value = { type: 'error', message: 'Mapping failed: ' + e.message } }
          finally { mappingLoading.value = false }
        }

        function toggle(key) { expanded[key] = !expanded[key] }

        // Auto-run if ?auto=1 (for screenshots)
        if (new URLSearchParams(location.search).has('auto')) {
          runDiscovery().then(() => runMapping())
        }

        return { loading, status, discovery, graphData, expanded, totalColumns, totalRows, runDiscovery, mapping, mappingLoading, mappingStatus, runMapping, toggle }
      }
    }).mount('#app')
  </script>

  <script>
    const navbar = document.querySelector('.navbar')
    function updateNav() {
      const nb = navbar.getBoundingClientRect().bottom
      let onDark = false
      for (const s of document.querySelectorAll('[data-dark]')) {
        const r = s.getBoundingClientRect()
        if (r.top < nb && r.bottom > 0) { onDark = true; break }
      }
      navbar.classList.toggle('on-dark', onDark)
    }
    window.addEventListener('scroll', updateNav, { passive: true })
    window.addEventListener('resize', updateNav)
    updateNav()
    new MutationObserver(updateNav).observe(document.getElementById('app'), { childList: true, subtree: true })
  </script>
</body>
</html>
